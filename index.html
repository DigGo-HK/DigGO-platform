<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DigGO 醫療探索平台 - 真實版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto; background: #f5f7fb; color: #333; }
        
        /* 心電圖啟動畫面 */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a5c8e, #0066cc, #2a8bc2, #3aa8e0);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
            overflow: hidden;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .ecg-container { position: absolute; bottom: 5%; left: 0; width: 100%; height: 80px; overflow: hidden; }
        .ecg-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; fill: none; stroke: rgba(255,255,255,0.6); stroke-width: 2; }
        .ecg-path { stroke-dasharray: 2000; stroke-dashoffset: 2000; animation: drawECG 1.5s ease-in-out infinite alternate; }
        @keyframes drawECG { 0% { stroke-dashoffset: 2000; } 50% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
        .heart-beat { position: absolute; bottom: 12%; right: 5%; font-size: 40px; color: rgba(255,255,255,0.4); animation: pulse 1s ease infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(0.95); opacity: 0.4; } }
        .splash-content { text-align: center; color: white; z-index: 2; }
        .splash-logo { font-size: 80px; font-weight: 800; background: rgba(255,255,255,0.25); backdrop-filter: blur(8px); padding: 20px 30px; border-radius: 40px; display: inline-block; margin-bottom: 20px; }
        .splash-logo .dc { font-size: 80px; }
        .splash-logo .box { font-size: 48px; margin-top: -10px; }
        .splash-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .splash-subtitle { font-size: 16px; opacity: 0.9; margin-bottom: 30px; }
        .splash-loading { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 主頁 */
        .main { display: none; min-height: 100vh; padding-bottom: 80px; }
        .status-bar { background: #0066cc; color: white; padding: 12px 16px; display: flex; justify-content: space-between; font-size: 14px; position: sticky; top: 0; z-index: 100; }
        .header { background: linear-gradient(135deg, #0066cc, #2a8bc2); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 800; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 15px; }
        .login-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 20px; background: white; margin: 15px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card { text-align: center; padding: 16px 8px; cursor: pointer; border-radius: 16px; transition: 0.2s; }
        .card:active { background: #e6f2ff; transform: scale(0.96); }
        .card i { font-size: 32px; margin-bottom: 8px; display: block; }
        .card span { font-size: 13px; font-weight: 500; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            padding: 10px 20px 20px;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        .nav-item { text-align: center; flex: 1; cursor: pointer; }
        .nav-item:active { transform: scale(0.95); }
        .nav-icon { font-size: 24px; color: #666; }
        .nav-label { font-size: 12px; color: #666; margin-top: 4px; }
        .nav-item.active .nav-icon, .nav-item.active .nav-label { color: #0066cc; font-weight: 500; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 20px; font-weight: 600; }
        .close-btn { font-size: 24px; cursor: pointer; color: #999; }
        .search-input { width: 100%; padding: 12px; border-radius: 30px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; }
        .clinic-card { background: #f5f7fb; border-radius: 16px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .clinic-card:active { background: #e6f2ff; transform: scale(0.98); }
        .btn-primary { background: #0066cc; color: white; border: none; padding: 15px; border-radius: 30px; width: 100%; cursor: pointer; margin-top: 20px; }
        .btn-secondary { background: #6c757d; color: white; border: none; padding: 12px; border-radius: 30px; width: 100%; cursor: pointer; margin-top: 10px; }
        .ocr-preview { background: #f0f0f0; border-radius: 16px; padding: 20px; text-align: center; margin: 20px 0; border: 2px dashed #999; cursor: pointer; }
        .loading { text-align: center; padding: 20px; color: #0066cc; }
        .queue-number { font-size: 48px; font-weight: 800; color: #0066cc; text-align: center; margin: 20px 0; }
        .progress-bar { height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; margin: 20px 0; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 30px; border: 1px solid #ddd; font-size: 16px; }
        .filter-chip { background: #f0f0f0; padding: 8px 16px; border-radius: 30px; font-size: 14px; cursor: pointer; display: inline-block; margin: 5px; }
        .appointment-item { background: #f5f7fb; border-radius: 16px; padding: 15px; margin-bottom: 10px; border-left: 4px solid #0066cc; }
    </style>
</head>
<body>
    <!-- 心電圖啟動畫面 -->
    <div class="splash" id="splash">
        <div class="heart-beat"><i class="fas fa-heartbeat"></i></div>
        <div class="ecg-container"><svg class="ecg-line" viewBox="0 0 1200 80" preserveAspectRatio="none"><path class="ecg-path" d="M0,40 L100,40 L120,40 L140,10 L160,70 L180,40 L200,40 L300,40 L320,40 L340,10 L360,70 L380,40 L400,40 L500,40 L520,40 L540,5 L560,75 L580,40 L600,40 L700,40 L720,40 L740,20 L760,60 L780,40 L800,40 L900,40 L920,40 L940,10 L960,70 L980,40 L1000,40 L1100,40 L1120,40 L1140,10 L1160,70 L1180,40 L1200,40" /></svg></div>
        <div class="splash-content"><div class="splash-logo"><div class="dc">D.C</div><div class="box">□</div></div><div class="splash-title">DigGO</div><div class="splash-subtitle">醫療探索平台</div><div class="splash-loading"></div></div>
    </div>

    <div class="main" id="main">
        <div class="status-bar"><span id="time"></span><span><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></span></div>
        <div class="header">
            <div class="logo">D.C □</div>
            <button class="login-btn" id="loginBtn" onclick="openLogin()"><i class="fas fa-user-circle"></i> 登入/註冊</button>
        </div>
        
        <div class="grid-3">
            <div class="card" onclick="searchDoctor()"><i class="fas fa-search" style="color:#0066cc"></i><span>醫生搜尋</span></div>
            <div class="card" onclick="searchSpecialist()"><i class="fas fa-user-md" style="color:#6f42c1"></i><span>專科醫生</span></div>
            <div class="card" onclick="openReferral()"><i class="fas fa-file-alt" style="color:#fd7e14"></i><span>轉介信預約</span></div>
            <div class="card" onclick="openQueue()"><i class="fas fa-hourglass-half" style="color:#28a745"></i><span>排隊通</span></div>
            <div class="card" onclick="openAppointments()"><i class="fas fa-calendar-alt" style="color:#17a2b8"></i><span>預約通</span></div>
            <div class="card" onclick="openMore()"><i class="fas fa-ellipsis-h" style="color:#999"></i><span>更多</span></div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item" onclick="switchTab('news', this)"><div class="nav-icon"><i class="fas fa-newspaper"></i></div><div class="nav-label">最新消息</div></div>
            <div class="nav-item" onclick="switchTab('services', this)"><div class="nav-icon"><i class="fas fa-th-large"></i></div><div class="nav-label">所有服務</div></div>
            <div class="nav-item" onclick="switchTab('support', this)"><div class="nav-icon"><i class="fas fa-headset"></i></div><div class="nav-label">支援</div></div>
            <div class="nav-item" onclick="switchTab('profile', this)"><div class="nav-icon"><i class="fas fa-user"></i></div><div class="nav-label">我的</div></div>
        </div>
        
        <div id="content" style="padding: 20px;"></div>
    </div>
    
    <!-- 登入 Modal -->
    <div class="modal" id="loginModal"><div class="modal-content"><div class="modal-header"><span>登入 / 註冊</span><span class="close-btn" onclick="closeModal('loginModal')">✕</span></div>
        <div id="stepPhone">
            <div class="form-group"><input type="tel" id="phone" placeholder="手機號碼"></div>
            <button class="btn-primary" onclick="sendOTP()">發送驗證碼</button>
        </div>
        <div id="stepOTP" style="display:none;">
            <div class="form-group"><input type="text" id="otp" placeholder="驗證碼"></div>
            <button class="btn-primary" onclick="verifyOTP()">驗證</button>
        </div>
        <div id="stepProfile" style="display:none;">
            <div class="form-group"><input type="text" id="name" placeholder="姓名"></div>
            <div class="form-group"><input type="number" id="age" placeholder="年齡"></div>
            <button class="btn-primary" onclick="register()">完成註冊</button>
        </div>
    </div></div>
    
    <!-- 搜尋 Modal -->
    <div class="modal" id="searchModal"><div class="modal-content"><div class="modal-header"><span>🔍 搜尋診所</span><span class="close-btn" onclick="closeModal('searchModal')">✕</span></div>
    <input type="text" class="search-input" id="searchInput" placeholder="輸入診所名稱或地區 (如: 中環診所)">
    <div class="filter-options"><span class="filter-chip" onclick="setLocation('中環診所')">中環</span><span class="filter-chip" onclick="setLocation('尖沙咀診所')">尖沙咀</span><span class="filter-chip" onclick="setLocation('心臟科醫生')">心臟科</span></div>
    <div id="searchResults"></div>
    <button class="btn-primary" onclick="doSearch()">搜尋</button></div></div>
    
    <!-- 轉介信 Modal -->
    <div class="modal" id="referralModal"><div class="modal-content"><div class="modal-header"><span>📄 轉介信預約</span><span class="close-btn" onclick="closeModal('referralModal')">✕</span></div>
    <input type="file" id="ocrFile" accept="image/*" style="display:none" onchange="doOCR(this)">
    <div class="ocr-preview" onclick="document.getElementById('ocrFile').click()"><i class="fas fa-cloud-upload-alt" style="font-size:48px;color:#0066cc;"></i><p>上傳公立醫院轉介信</p></div>
    <div id="ocrResult"></div></div></div>
    
    <!-- 排隊 Modal -->
    <div class="modal" id="queueModal"><div class="modal-content"><div class="modal-header"><span>🎟️ 排隊通</span><span class="close-btn" onclick="closeModal('queueModal')">✕</span></div><div id="queueDisplay"></div></div></div>
    
    <!-- 預約 Modal -->
    <div class="modal" id="appointmentsModal"><div class="modal-content"><div class="modal-header"><span>📅 預約通</span><span class="close-btn" onclick="closeModal('appointmentsModal')">✕</span></div><div id="appointmentList"></div></div></div>
    
    <!-- 更多 Modal -->
    <div class="modal" id="moreModal"><div class="modal-content"><div class="modal-header"><span>📋 更多服務</span><span class="close-btn" onclick="closeModal('moreModal')">✕</span></div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
        <div class="clinic-card" onclick="alert('藥物記錄功能開發中')">💊 藥物記錄</div>
        <div class="clinic-card" onclick="alert('健康建議功能開發中')">💡 健康建議</div>
        <div class="clinic-card" onclick="alert('保險配對功能開發中')">🛡️ 保險配對</div>
        <div class="clinic-card" onclick="alert('藥物送遞功能開發中')">💊 藥物送遞</div>
        <div class="clinic-card" onclick="alert('優惠資訊功能開發中')">💰 優惠資訊</div>
        <div class="clinic-card" onclick="alert('公私合作功能開發中')">🤝 公私合作</div>
    </div></div></div>
    
    <script>
        const GOOGLE_API_KEY = 'AIzaSyDGuc__VBmGzzQPg8PUuFuhZ2GKdasEtRU';
        let appointments = JSON.parse(localStorage.getItem('appointments') || '[]');
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        let pendingPhone = '';
        let searchType = 'doctor';
        
        // 啟動畫面 3 秒後消失
        setTimeout(() => {
            let splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                document.getElementById('main').style.display = 'block';
                switchTab('news', document.querySelector('.nav-item'));
                if(currentUser) document.getElementById('loginBtn').innerHTML = '<i class="fas fa-user-circle"></i> ' + currentUser.name;
            }, 500);
        }, 3000);
        
        function updateTime() {
            let now = new Date();
            document.getElementById('time').textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
        }
        updateTime();
        setInterval(updateTime, 60000);
        
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        // 主功能
        function searchDoctor() { searchType = 'doctor'; openModal('searchModal'); }
        function searchSpecialist() { searchType = 'specialist'; openModal('searchModal'); }
        function openReferral() { openModal('referralModal'); }
        function openQueue() {
            if(appointments.length > 0) {
                let last = appointments[appointments.length-1];
                let num = 'A' + Math.floor(Math.random()*900+100);
                let ahead = Math.floor(Math.random()*8)+1;
                document.getElementById('queueDisplay').innerHTML = '<div style="text-align:center;"><div class="queue-number">🎫 ' + num + '</div><p>' + last.name + '</p><p>👥 前面 ' + ahead + ' 人</p><p>⏰ 預計等候：' + (15+ahead*2) + ' 分鐘</p><div class="progress-bar"><div style="height:10px;background:#0066cc;width:' + (100-ahead*8) + '%"></div></div><button class="btn-primary" onclick="closeModal(\'queueModal\')">關閉</button></div>';
                openModal('queueModal');
            } else {
                document.getElementById('queueDisplay').innerHTML = '<div style="text-align:center;"><p>未有排隊</p><button class="btn-primary" onclick="closeModal(\'queueModal\');searchDoctor()">去預約</button></div>';
                openModal('queueModal');
            }
        }
        function openAppointments() {
            let html = appointments.length ? appointments.map(a => '<div class="appointment-item">📅 ' + a.date + '<br><b>' + a.name + '</b><br>📍 ' + a.address + '<br>📞 ' + a.phone + '<br>✅ 已確認</div>').join('') : '<div class="clinic-card">暫無預約</div>';
            document.getElementById('appointmentList').innerHTML = html;
            openModal('appointmentsModal');
        }
        function openMore() { openModal('moreModal'); }
        
        function setLocation(loc) { document.getElementById('searchInput').value = loc; doSearch(); }
        
        // ==================== Google Places API 真實搜尋 ====================
        async function doSearch() {
            let term = document.getElementById('searchInput').value.trim();
            let div = document.getElementById('searchResults');
            if(!term) { div.innerHTML = '<div style="padding:20px;">請輸入診所名稱或地區</div>'; return; }
            div.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 搜尋中...</div>';
            try {
                let query = searchType === 'specialist' ? term + ' 專科醫生 Hong Kong' : term + ' Hong Kong';
                let res = await fetch(`https://maps.googleapis.com/maps/api/place/textsearch/json?query=${encodeURIComponent(query)}&location=22.3193,114.1694&radius=10000&key=${GOOGLE_API_KEY}`);
                let data = await res.json();
                if(data.results && data.results.length) {
                    div.innerHTML = data.results.slice(0,10).map(p => `
                        <div class="clinic-card">
                            <div style="display:flex;justify-content:space-between;">
                                <b>${p.name}</b>
                                <span>⭐ ${p.rating || '新'}</span>
                            </div>
                            <p>📍 ${p.formatted_address || p.vicinity || '地址待更新'}</p>
                            <p>📞 ${p.formatted_phone_number || '電話待查詢'}</p>
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <button class="btn-primary" style="margin:0; padding:8px 16px; flex:1;" onclick="bookClinic('${p.name.replace(/'/g,"\\'")}', '${(p.formatted_address || p.vicinity || '').replace(/'/g,"\\'")}', '${p.formatted_phone_number || '待查詢'}')">📅 預約</button>
                                <button class="btn-secondary" style="margin:0; padding:8px 16px; flex:1;" onclick="doSearch()">🔄 重新搜尋</button>
                            </div>
                        </div>
                    `).join('');
                } else div.innerHTML = '<div style="padding:20px;">沒有找到診所，請嘗試其他關鍵字</div>';
            } catch(e) { div.innerHTML = '<div style="padding:20px;">搜尋失敗，請稍後再試</div>'; }
        }
        
        // ==================== 預約功能 ====================
        function bookClinic(name, address, phone) {
            if(confirm(`確認預約 ${name}？\n地址：${address}\n電話：${phone}\n\n預約後會自動加入「預約通」及「排隊通」`)) {
                // AI 自動記錄：存入 localStorage (模擬資料庫 + 診所後台)
                const appointment = {
                    id: Date.now(),
                    name: name,
                    address: address,
                    phone: phone,
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString(),
                    status: '已確認'
                };
                appointments.push(appointment);
                localStorage.setItem('appointments', JSON.stringify(appointments));
                
                // AI 自動彈去預約通作紀錄
                alert(`✅ 預約成功！\n\n診所：${name}\n日期：${appointment.date}\n時間：${appointment.time}\n\n已自動存入「預約通」`);
                closeModal('searchModal');
                
                // 顯示成功預約並自動跳去排隊通
                openQueue();
            }
        }
        
        // ==================== Google Vision OCR ====================
        async function doOCR(input) {
            let file = input.files[0];
            if(!file) return;
            let reader = new FileReader();
            reader.onload = async function(e) {
                document.getElementById('ocrResult').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> AI識別中...</div>';
                try {
                    let res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({ requests: [{ image: { content: e.target.result.split(',')[1] }, features: [{ type: 'DOCUMENT_TEXT_DETECTION' }] }] })
                    });
                    let data = await res.json();
                    let text = data.responses?.[0]?.fullTextAnnotation?.text || '未識別';
                    let specialty = text.includes('心臟') ? '心臟科' : (text.includes('骨科') ? '骨科' : (text.includes('兒科') ? '兒科' : '一般門診'));
                    document.getElementById('ocrResult').innerHTML = `
                        <div style="background:#e6f2ff;padding:15px;border-radius:16px;">
                            <b>✅ AI 識別結果</b><p>${text.substring(0,200)}</p>
                            <p>📋 建議專科：${specialty}</p>
                        </div>
                        <button class="btn-primary" onclick="closeModal('referralModal');searchSpecialist();document.getElementById('searchInput').value='${specialty}醫生';doSearch();">🔍 搜尋 ${specialty}醫生</button>
                    `;
                } catch(e) { document.getElementById('ocrResult').innerHTML = '<div style="padding:20px;">識別失敗</div>'; }
            };
            reader.readAsDataURL(file);
        }
        
        // 登入註冊
        function openLogin() { openModal('loginModal'); }
        function sendOTP() {
            let phone = document.getElementById('phone').value;
            if(!phone || phone.length<8) { alert('請輸入正確手機號碼'); return; }
            pendingPhone = phone;
            let otp = Math.floor(100000+Math.random()*900000);
            alert('驗證碼：' + otp);
            localStorage.setItem('pendingOTP', otp);
            document.getElementById('stepPhone').style.display = 'none';
            document.getElementById('stepOTP').style.display = 'block';
        }
        function verifyOTP() {
            if(document.getElementById('otp').value === localStorage.getItem('pendingOTP')) {
                document.getElementById('stepOTP').style.display = 'none';
                document.getElementById('stepProfile').style.display = 'block';
            } else alert('驗證碼錯誤');
        }
        function register() {
            let name = document.getElementById('name').value;
            let age = document.getElementById('age').value;
            if(!name) { alert('請輸入姓名'); return; }
            currentUser = { phone: pendingPhone, name: name, age: age };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('loginBtn').innerHTML = '<i class="fas fa-user-circle"></i> ' + name;
            closeModal('loginModal');
            alert('✅ 註冊成功！');
            switchTab('profile', document.querySelector('.nav-item'));
        }
        
        // 底部導航
        function switchTab(tab, el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if(el) el.classList.add('active');
            let content = document.getElementById('content');
            if(tab === 'news') {
                content.innerHTML = '<div class="clinic-card"><b>🏥 長者醫療券獎賞計劃</b><br>累積$1,000獲$500獎賞</div><div class="clinic-card"><b>💉 流感疫苗接種計劃</b><br>合資格人士免費接種</div>';
            } else if(tab === 'services') {
                content.innerHTML = '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">' +
                    '<div class="clinic-card" onclick="searchDoctor()">🔍 醫生搜尋</div>' +
                    '<div class="clinic-card" onclick="searchSpecialist()">👨‍⚕️ 專科醫生</div>' +
                    '<div class="clinic-card" onclick="openReferral()">📄 轉介信預約</div>' +
                    '<div class="clinic-card" onclick="openQueue()">🎟️ 排隊通</div>' +
                    '<div class="clinic-card" onclick="openAppointments()">📅 預約通</div>' +
                    '</div>';
            } else if(tab === 'support') {
                content.innerHTML = '<div class="clinic-card" onclick="alert(\'客服熱線：2121 8080\')">📞 聯絡我們</div>';
            } else if(tab === 'profile') {
                if(currentUser) {
                    content.innerHTML = '<div class="clinic-card"><b>👤 ' + currentUser.name + '</b><br>📱 ' + currentUser.phone + '<br>🎂 ' + (currentUser.age || '未提供') + '歲</div><div class="clinic-card" onclick="openAppointments()">📋 預約紀錄 (' + appointments.length + ')</div><div class="clinic-card" onclick="localStorage.clear();location.reload()">🚪 登出</div>';
                } else {
                    content.innerHTML = '<div class="clinic-card" onclick="openLogin()">👤 請先登入</div>';
                }
            }
        }
    </script>
</body>
</html>
